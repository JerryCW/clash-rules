# ============================================
# 代理分组配置 - 精简版
# 适配：[Hy2]/[vless] 协议节点
# ============================================

proxy-groups:
  # ============ 地区分组 ============
  # 香港 — vless+REALITY Dynamic ×2
  - name: 🇭🇰 香港节点
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)HK"

  # 台湾 — Hy2 Dynamic ×4 + vless Ultimate ×4，Ultimate 优先
  - name: 🇼🇸 台湾节点
    type: fallback
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    proxies:
      - 🇼🇸 台湾Ultimate
      - 🇼🇸 台湾Dynamic

  - name: 🇼🇸 台湾Ultimate
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "TW Ultimate"

  - name: 🇼🇸 台湾Dynamic
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "TW Dynamic"

  # 美国 — vless+REALITY Ultimate ×8
  - name: 🇺🇸 美国节点
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)US"

  # 日本 — vless+REALITY Ultimate ×1
  - name: 🇯🇵 日本节点
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)Japan"

  # 新加坡 — Hy2 ×1 + vless Ultimate ×8
  - name: 🇸🇬 新加坡节点
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    include-all: true
    filter: "(?i)SG"

  # ============ 核心组 ============
  - name: 🚀 手动选择
    type: select
    proxies:
      - GY-Private
      - 🇭🇰 香港节点
      - 🇺🇸 美国节点
      - 🇸🇬 新加坡节点
      - 🇯🇵 日本节点
      - 🇼🇸 台湾节点

  - name: ♻️ 自动选择
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    proxies:
      - GY-Private
      - 🇭🇰 香港节点
      - 🇸🇬 新加坡节点
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🇼🇸 台湾节点


  # ============ 功能组 ============
  - name: 💬 即时通讯
    type: select
    proxies: [♻️ 自动选择, 🇭🇰 香港节点, 🇺🇸 美国节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇼🇸 台湾节点, 🎯 全球直连]

  - name: 🌐 社交媒体
    type: select
    proxies: [♻️ 自动选择, 🇭🇰 香港节点, 🇺🇸 美国节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇼🇸 台湾节点, 🎯 全球直连]

  - name: 🤖 AI服务
    type: fallback
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    proxies: [🇸🇬 新加坡节点, 🇺🇸 美国节点, 🇯🇵 日本节点, 🇼🇸 台湾节点, GY-Private]

  - name: 🎬 流媒体
    type: select
    proxies: [♻️ 自动选择, 🇭🇰 香港节点, 🇺🇸 美国节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇼🇸 台湾节点]

  - name: 🎥 Netflix
    type: select
    proxies: [🇭🇰 香港节点, 🇺🇸 美国节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇼🇸 台湾节点, GY-Private]

  - name: 🎮 游戏
    type: select
    proxies: [♻️ 自动选择, 🇭🇰 香港节点, 🇺🇸 美国节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇼🇸 台湾节点, 🎯 全球直连]

  - name: 🛠 开发工具
    type: select
    proxies: [♻️ 自动选择, 🇭🇰 香港节点, 🇺🇸 美国节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇼🇸 台湾节点, 🎯 全球直连]

  - name: 🍎 苹果服务
    type: select
    proxies: [🎯 全球直连, ♻️ 自动选择, 🇭🇰 香港节点, 🇺🇸 美国节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇼🇸 台湾节点]

  - name: 🇬 谷歌服务
    type: select
    proxies: [♻️ 自动选择, 🇭🇰 香港节点, 🇺🇸 美国节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇼🇸 台湾节点, 🎯 全球直连]

  - name: Ⓜ️ 微软服务
    type: select
    proxies: [🎯 全球直连, ♻️ 自动选择, 🇭🇰 香港节点, 🇺🇸 美国节点, 🇸🇬 新加坡节点, 🇯🇵 日本节点, 🇼🇸 台湾节点]

  # ============ 特殊组 ============
  - name: 🌐 AmazonWork
    type: select
    proxies: [🎯 全球直连, 🚀 手动选择]

  - name: 🐟 漏网之鱼
    type: select
    proxies: [♻️ 自动选择, 🎯 全球直连]

  - name: 🎯 全球直连
    type: select
    proxies: [DIRECT]