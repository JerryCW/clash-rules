    type: select
    proxies: [♻️ 自动选择, 🇭🇰 香港智能, 🇺🇸 美国智能, 🇸🇬 新加坡智能, 🇯🇵 日本智能, 🇼🇸 台湾智能, 🎯 全球直连]

