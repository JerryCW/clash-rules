# ============================================
# 代理分组配置 - Smart Groups 版本
# 适配新订阅格式：[Hy2]/[vless] 协议节点
# 特点：智能分组，自动选择最优节点
# ============================================

proxy-groups:
  # ============ 智能地区分组 ============
  - name: 🇭🇰 香港智能
    type: smart
    uselightgbm: true
    collectdata: true
    strategy: sticky-sessions
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    per-asn: true
    sample-rate: 1
    include-all: true
    filter: "(?i)HK"

  - name: 🇺🇸 美国智能
    type: smart
    uselightgbm: true
    collectdata: true
    strategy: sticky-sessions
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    per-asn: true
    sample-rate: 1
    include-all: true
    filter: "(?i)US"

  - name: 🇯🇵 日本智能
    type: smart
    uselightgbm: true
    collectdata: true
    strategy: sticky-sessions
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    per-asn: true
    sample-rate: 1
    include-all: true
    filter: "(?i)Japan"

  - name: 🇸🇬 新加坡智能
    type: smart
    uselightgbm: true
    collectdata: true
    strategy: sticky-sessions
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    per-asn: true
    sample-rate: 1
    include-all: true
    filter: "(?i)SG"

  - name: 🇼🇸 台湾智能
    type: smart
    uselightgbm: true
    collectdata: true
    strategy: sticky-sessions
    policy-priority: "Ultimate:1;Dynamic:0.5"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    per-asn: true
    sample-rate: 1
    include-all: true
    filter: "(?i)TW"

  # ============ 主要选择组 ============
  - name: 🚀 手动选择
    type: select
    proxies: [🇭🇰 香港智能, 🇺🇸 美国智能, 🇸🇬 新加坡智能, 🇯🇵 日本智能, 🇼🇸 台湾智能, GY-Private]

  - name: ♻️ 自动选择
    type: fallback
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    proxies: [🇭🇰 香港智能, 🇸🇬 新加坡智能, 🇯🇵 日本智能, 🇺🇸 美国智能, 🇼🇸 台湾智能, GY-Private]

  # ============ 应用专用分组 ============
